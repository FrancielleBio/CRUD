<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Clientes</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h1>Cadastro de Clientes</h1>
    <p>Aplicação usando Fetch API com GET, POST e DELETE na API CrudCrud.</p>

    <form id="formCliente">
      <label for="nome">Nome:</label>
      <input type="text" id="nome" placeholder="Digite o nome do cliente" required>

      <label for="email">E-mail:</label>
      <input type="email" id="email" placeholder="Digite o e-mail do cliente" required>

      <button type="submit">Cadastrar Cliente</button>
    </form>

    <p id="mensagem"></p>

    <h2>Clientes cadastrados</h2>
    <ul id="listaClientes"></ul>
  </main>

  <script src="scripts.js"></script>
</body>
</html>
